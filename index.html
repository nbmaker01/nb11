<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR A-Frame GLB Example</title>

  <!-- A-Frame 기본 라이브러리 -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- 이동 기능을 위한 컴포넌트 -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
</head>
<body>
  <a-scene background="color: #ECECEC">

    <!-- 모델 미리 로드 -->
    <a-assets>
      <a-asset-item id="myModel" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- 하늘 -->
    <a-sky color="#BFDFFF"></a-sky>

    <!-- 바닥 -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#CFCFCF"
    ></a-plane>

    <!-- 조명 -->
    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="3 6 2" intensity="1"></a-light>

    <!-- 🔥 모델 크기 줄인 부분 (2 → 1로 축소) -->
    <a-entity
      gltf-model="#myModel"
      position="0 0 -4"
      scale="1 1 1"
      rotation="0 25 0"
    ></a-entity>

    <!-- 카메라 (PC + VR 이동) -->
    <a-entity id="rig" position="0 1.6 3" movement-controls="speed: 0.18">

      <!-- 시점 -->
      <a-entity
        camera
        look-controls="pointerLockEnabled: true"
        wasd-controls="acceleration: 20"
      ></a-entity>

      <!-- VR 컨트롤러 -->
      <a-entity laser-controls="hand: left"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>

    </a-entity>

  </a-scene>
</body>
</html>
