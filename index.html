<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <!-- A-Frame 씬 시작 -->
  <a-scene>

    <!-- =========================
         카메라 + 이동 설정
         ========================= -->
    <a-entity 
      id="player"
      position="0 1.6 20"
      camera
      wasd-controls
      look-controls>
    </a-entity>

    <!-- =========================
         VR 컨트롤러 설정
         ========================= -->
    <a-entity hand-controls="hand: left"></a-entity>
    <a-entity hand-controls="hand: right"></a-entity>

    <!-- =========================
         조명 설정
         ========================= -->
    <a-light type="ambient" intensity="0.8"></a-light>
    <a-light type="directional" position="10 20 10" intensity="1.5"></a-light>

    <!-- =========================
         바닥 생성 (더 넓게)
         ========================= -->
    <a-plane 
      position="0 0 0"
      rotation="-90 0 0"
      width="500"
      height="500"
      color="#7BC8A4">
    </a-plane>

    <!-- =========================
         하늘 생성
         ========================= -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- =========================
         3D 모델(GLB) 불러오기
         ========================= -->
    <!--
      scale을 200배로 매우 크게 설정
    -->
    <a-entity 
      gltf-model="model.glb"
      position="0 0 -50"
      scale="200 200 200"
      rotation="0 45 0">
    </a-entity>

  </a-scene>
</body>
</html>
