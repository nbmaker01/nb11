/<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <!-- A-Frame 씬 시작 -->
  <a-scene>

    <!-- =========================
         카메라 + 이동 설정
         ========================= -->
    <!--
      wasd-controls: 키보드 이동 (PC)
      look-controls: 마우스 시점 이동 (PC) + VR 헤드 트래킹
    -->
    <a-entity 
      id="player"
      position="0 1.6 3"
      camera
      wasd-controls
      look-controls>
    </a-entity>

    <!-- =========================
         VR 컨트롤러 설정
         ========================= -->
    <!-- 왼손 컨트롤러 -->
    <a-entity hand-controls="hand: left"></a-entity>

    <!-- 오른손 컨트롤러 -->
    <a-entity hand-controls="hand: right"></a-entity>

    <!-- =========================
         조명 설정
         ========================= -->
    <!-- 전체를 밝히는 기본 조명 -->
    <a-light type="ambient" intensity="0.6"></a-light>

    <!-- 방향성 조명 (태양 역할) -->
    <a-light 
      type="directional" 
      position="2 4 2" 
      intensity="1">
    </a-light>

    <!-- =========================
         바닥 생성
         ========================= -->
    <!--
      rotation="-90 0 0" : 평면을 바닥으로 눕힘
    -->
    <a-plane 
      position="0 0 0"
      rotation="-90 0 0"
      width="20"
      height="20"
      color="#7BC8A4">
    </a-plane>

    <!-- =========================
         하늘 생성
         ========================= -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- =========================
         3D 모델(GLB) 불러오기
         ========================= -->
    <!--
      position: 앞쪽 중앙
      scale: 크게 확대
      rotation: 약간 회전
    -->
    <a-entity 
      gltf-model="model.glb"
      position="0 0 -3"
      scale="2 2 2"
      rotation="0 45 0">
    </a-entity>

  </a-scene>
</body>
</html>
/
